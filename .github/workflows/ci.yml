name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve toolchain from rust-toolchain.toml
        id: toolchain
        shell: bash
        run: |
          channel=$(grep -oE 'channel[[:space:]]*=[[:space:]]*"[^"]+"' rust-toolchain.toml | grep -oE '"[^"]+"' | tr -d '"')
          test -n "$channel" || { echo "could not read channel from rust-toolchain.toml"; exit 1; }
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo test --workspace --locked
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: clippy (no default features)
        run: cargo clippy --workspace --all-targets --no-default-features --locked -- -D warnings
      - run: cargo run -p beatbox --locked -- --version
      - name: CLI fib smoke
        run: |
          cargo run -p beatbox --locked -- run examples/fib.wasm --input '{"n":10}' | tee /tmp/beatbox-fib.json
          grep '"status": "ok"' /tmp/beatbox-fib.json
          grep '"value": 55' /tmp/beatbox-fib.json
          grep '"deterministic": true' /tmp/beatbox-fib.json
      - name: CLI spin fuel smoke
        run: |
          cargo run -p beatbox --locked -- run examples/spin.wasm --input '{"n":0}' --policy fuel=1000000 | tee /tmp/beatbox-spin.json
          grep '"status": "timeout"' /tmp/beatbox-spin.json
          grep '"code": "fuel_exhausted"' /tmp/beatbox-spin.json
